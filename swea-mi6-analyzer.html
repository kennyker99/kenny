};

function calculateVerdict(indicators) {
  const values = Object.values(indicators);
  const bullishCount = values.filter(v => v.state === "bullish").length;
  const bearishCount = values.filter(v => v.state === "bearish").length;
  const neutralCount = values.filter(v => v.state === "neutral").length;
  const confidence = Math.round((Math.max(bullishCount, bearishCount) / 6) * 100);
  const netScore = bullishCount - bearishCount;
  const base = { bullishCount, bearishCount, neutralCount, confidence, netScore };

  if (bullishCount >= 5) return { ...base, signal:"strong_bullish", label:"强烈多头信号",
    description:`${bullishCount}/6 项指标一致看涨，信号高度可靠，可积极寻找做多入场机会。` };
  if (bullishCount >= 4) return { ...base, signal:"bullish", label:"多头信号",
    description:`${bullishCount}/6 项指标看涨，整体偏多，可寻找做多机会，注意风险管理。` };
  if (bearishCount >= 5) return { ...base, signal:"strong_bearish", label:"强烈空头信号",
    description:`${bearishCount}/6 项指标一致看跌，信号高度可靠，可积极寻找做空入场机会。` };
  if (bearishCount >= 4) return { ...base, signal:"bearish", label:"空头信号",
    description:`${bearishCount}/6 项指标看跌，整体偏空，可寻找做空机会，注意风险管理。` };
  if (Math.abs(bullishCount - bearishCount) <= 1 && neutralCount <= 2) return { ...base, signal:"mixed", label:"信号混合",
    description:`多空信号相互矛盾（多头 ${bullishCount} vs 空头 ${bearishCount}），建议观望等待更清晰信号。` };
  return { ...base, signal:"no_signal", label:"无明确信号",
    description:`当前 ${neutralCount} 项指标中性，信号不足，建议等待更多市场确认。` };
}

const STORAGE_KEY = "swea_mi6_records_v2";
function loadRecords(){ try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; } }
function saveRecord(rec){
  const records = loadRecords();
  const i = records.findIndex(r => r.id === rec.id);
  if (i >= 0) records[i] = rec; else records.unshift(rec);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
}
function deleteRecord(id){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(loadRecords().filter(r => r.id !== id)));
}

function toast(msg, type="info"){
  const colors = { info:"bg-slate-700", success:"bg-emerald-600", error:"bg-red-600" };
  const el = document.createElement("div");
  el.className = `${colors[type]} text-white text-sm px-4 py-2.5 rounded-lg shadow-lg fade-in max-w-xs`;
  el.textContent = msg;
  $("#toasts").appendChild(el);
  setTimeout(() => { el.style.transition="opacity .3s"; el.style.opacity="0"; setTimeout(()=>el.remove(),300); }, 2600);
}

function summaryHTML(){

function refreshVerdict(){
  const v = calculateVerdict(analyzer.indicators);
  const slot = $("#verdictSlot"); if (slot) slot.innerHTML = verdictCardHTML(v);
  const sum = $("#summarySlot"); if (sum) sum.innerHTML = summaryHTML();
  const mvb = $("#mobileVerdictBody");
  if (mvb) mvb.innerHTML = verdictCardHTML(v) + `<div class="mt-4 rounded-xl border border-amber-500/15 bg-amber-500/5 p-4">${ruleHTML()}</div>`;
  const bar = $("#mobileVerdictToggle");
  if (bar){
    bar.querySelector("span").className = `text-sm font-bold ${getVerdictColor(v.signal)}`;
    bar.querySelector("span").textContent = SIGNAL_LABELS_SHORT[v.signal];
  }
}

function readImage(file, maxMB, cb){
  if (!file) return;
  if (file.size > maxMB*1024*1024){ toast(`图片大小不能超过 ${maxMB}MB`, "error"); return; }
  const reader = new FileReader();
  reader.onload = e => cb(e.target.result);
  reader.readAsDataURL(file);
}
function pickFile(maxMB, cb){
  const inp = document.createElement("input");
  inp.type = "file"; inp.accept = "image/*";
  inp.onchange = () => readImage(inp.files[0], maxMB, cb);
  inp.click();
}

function bindAnalyzer(){
  const pairSel = $("#pairSel");
  if (pairSel) pairSel.onchange = e => { if (e.target.value==="__custom__"){ analyzer.showCustomPair=true; renderAnalyzer(); } else { analyzer.pair=e.target.value; } };
  const cp = $("#customPair");
  if (cp){ cp.focus(); cp.oninput = e => analyzer.customPair = e.target.value;
    cp.onblur = () => { if (!analyzer.customPair){ analyzer.showCustomPair=false; renderAnalyzer(); } }; }
  $("#tfSel").onchange = e => analyzer.timeframe = e.target.value;
  $("#globalNotes").oninput = e => analyzer.notes = e.target.value;

  // indicator cards
  document.querySelectorAll(".indicator-card").forEach(card => bindIndicatorCard(card, card.dataset.id));

  // chart upload
  bindChartSlot();

  // header buttons
  $("#resetBtn").onclick = () => { analyzer.indicators = createDefaultIndicators(); analyzer.notes=""; analyzer.chartImage=undefined; renderAnalyzer(); toast("已重置所有指标"); };
  $("#saveBtn").onclick = handleSave;
  $("#pdfBtn").onclick = handleExportPDF;

  // mobile verdict toggle
  const mvt = $("#mobileVerdictToggle");
  if (mvt) mvt.onclick = () => $("#mobileVerdictBody").classList.toggle("hidden");
}

// Bind one indicator card's events. Used on first render and after a
// targeted in-place update (avoids re-rendering the whole page → no flicker).
function bindIndicatorCard(card, id){
  card.querySelectorAll(".state-btn").forEach(btn => {
    btn.onclick = () => { analyzer.indicators[id].state = btn.dataset.state; updateIndicatorCard(id); refreshVerdict(); };
  });
  const ta = card.querySelector(".notes-input");
  ta.oninput = e => { analyzer.indicators[id].notes = e.target.value; };
  const refToggle = card.querySelector(".ref-toggle");
  refToggle.onclick = () => {
    const body = card.querySelector(".ref-body");
    const chev = refToggle.querySelector(".chev");
    body.classList.toggle("hidden");
    chev.style.transform = body.classList.contains("hidden") ? "" : "rotate(180deg)";
  };
  bindImgSlot(card.querySelector(".img-slot"), id);
}

// Replace a single card in place (state pill / border / button colors)
// without touching the rest of the DOM — eliminates the full-page flash.
function updateIndicatorCard(id){
  const old = document.querySelector(`.indicator-card[data-id="${id}"]`);
  if (!old) return;
  const refOpen = old.querySelector(".ref-body") && !old.querySelector(".ref-body").classList.contains("hidden");
  const tmp = document.createElement("div");
  tmp.innerHTML = indicatorCardHTML(id);
  const fresh = tmp.firstElementChild;
  if (refOpen){
    fresh.querySelector(".ref-body").classList.remove("hidden");
    fresh.querySelector(".chev").style.transform = "rotate(180deg)";
  }
  old.replaceWith(fresh);
  bindIndicatorCard(fresh, id);
}

function bindImgSlot(slot, id){
  const up = slot.querySelector(".img-upload");
  if (up) up.onclick = () => pickFile(5, data => { analyzer.indicators[id].imageData = data; slot.innerHTML = indicatorImgHTML(id); bindImgSlot(slot,id); });
  const view = slot.querySelector(".img-view");
  if (view) view.onclick = () => openLightbox(analyzer.indicators[id].imageData);
  const rm = slot.querySelector(".img-remove");
  if (rm) rm.onclick = () => { analyzer.indicators[id].imageData = undefined; slot.innerHTML = indicatorImgHTML(id); bindImgSlot(slot,id); };
}

function bindChartSlot(){
  const slot = $("#chartSlot");
  const up = $("#chartUpload");
  if (up) up.onclick = () => pickFile(8, data => { analyzer.chartImage = data; slot.innerHTML = chartUploadHTML(); bindChartSlot(); });
  const view = $("#chartView"); if (view) view.onclick = () => openLightbox(analyzer.chartImage);
  const rm = $("#chartRemove"); if (rm) rm.onclick = () => { analyzer.chartImage=undefined; slot.innerHTML = chartUploadHTML(); bindChartSlot(); };
}

function handleSave(){
  // sync textareas (oninput already keeps them, but ensure)
  const v = calculateVerdict(analyzer.indicators);
  const rec = {
    id: uid(), pair: activePair(), timeframe: analyzer.timeframe,
    date: new Date().toISOString(),
    indicators: JSON.parse(JSON.stringify(analyzer.indicators)),
    verdict: v, chartImage: analyzer.chartImage,
    notes: analyzer.notes.trim() || undefined,
  };
  saveRecord(rec);
  toast(`已保存 ${rec.pair} ${rec.timeframe} 分析记录`, "success");
}

/* ── Lightbox ── */
function openLightbox(src){
  if (!src) return;
  const lb = document.createElement("div");
  lb.className = "fixed inset-0 z-[60] bg-black/90 flex items-center justify-center p-4";
  lb.innerHTML = `<button class="absolute top-4 right-4 text-white/60 hover:text-white">${svgIcon('<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',24)}</button><img src="${src}" class="max-w-full max-h-full rounded-xl shadow-2xl"/>`;
  lb.onclick = e => { if (e.target === lb || e.target.closest("button")) lb.remove(); };
  document.body.appendChild(lb);
}

/* ── PDF export (opens print window) ── */
function handleExportPDF(){
  const v = calculateVerdict(analyzer.indicators);
  const html = buildPrintContent(activePair(), analyzer.timeframe, analyzer.indicators, v, analyzer.notes, analyzer.chartImage);
  const w = window.open("", "_blank");
  if (w){ w.document.write(html); w.document.close(); w.focus(); setTimeout(()=>w.print(), 600); }
  else toast("请允许弹出窗口以导出 PDF", "error");
}

function buildPrintContent(pair, timeframe, indicators, verdict, notes, chartImage){
  const date = new Date().toLocaleString("zh-CN");
  const names = { candlestick:"蜡烛形态 (Candlestick Pattern)", chartPattern:"图表形态 (Chart Pattern)", trendPattern:"趋势形态 (Trend Pattern)", fibonacci:"斐波那契 (Fibonacci)", bollingerBand:"布林带 (Bollinger Band)", movingAverage:"均线 MA20 (Moving Average 20)" };
  const rows = Object.entries(indicators).map(([k,val])=>{
    const lbl = val.state==="bullish"?"▲ 看涨":val.state==="bearish"?"▼ 看跌":"— 中性";
    const col = val.state==="bullish"?"#10b981":val.state==="bearish"?"#ef4444":"#6b7280";
    return `<tr><td style="padding:8px 12px;border-bottom:1px solid #e5e7eb;font-weight:600;">${names[k]}</td><td style="padding:8px 12px;border-bottom:1px solid #e5e7eb;color:${col};font-weight:bold;">${lbl}</td><td style="padding:8px 12px;border-bottom:1px solid #e5e7eb;color:#6b7280;font-size:12px;">${esc(val.notes)||"—"}</td></tr>`;
  }).join("");
  const vc = verdict.signal.includes("bullish")?"#10b981":verdict.signal.includes("bearish")?"#ef4444":"#f59e0b";
  const stars = (verdict.signal==="strong_bullish"||verdict.signal==="strong_bearish")?"★★★":(verdict.signal==="bullish"||verdict.signal==="bearish")?"★★☆":verdict.signal==="mixed"?"★☆☆":"☆☆☆";
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>SWEA MI6 分析报告 — ${pair} ${timeframe}</title>
  <style>body{font-family:Arial,sans-serif;max-width:750px;margin:0 auto;padding:32px;color:#111;}h1{font-size:22px;margin-bottom:4px;}.meta{color:#6b7280;font-size:13px;margin-bottom:24px;}table{width:100%;border-collapse:collapse;margin-bottom:24px;}th{background:#f9fafb;padding:10px 12px;text-align:left;font-size:11px;color:#6b7280;border-bottom:2px solid #e5e7eb;text-transform:uppercase;}.verdict-box{border:2px solid ${vc};border-radius:10px;padding:20px;margin-bottom:24px;}.verdict-title{font-size:22px;font-weight:bold;color:${vc};}.verdict-stars{font-size:18px;color:${vc};margin-bottom:8px;}.score-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px;}.score-item{text-align:center;padding:12px;border-radius:8px;}.notes{background:#f9fafb;border-radius:8px;padding:14px;font-size:13px;color:#374151;margin-bottom:20px;}.chart-img{width:100%;border-radius:8px;margin-bottom:24px;border:1px solid #e5e7eb;}@media print{body{padding:16px;}}</style></head>
  <body><h1>SWEA MI6 信号分析报告</h1>
  <div class="meta">交易对：<strong>${pair}</strong> &nbsp;|&nbsp; 时间框架：<strong>${timeframe}</strong> &nbsp;|&nbsp; 分析时间：${date}</div>
  ${chartImage?`<img src="${chartImage}" class="chart-img"/>`:""}
  <div class="verdict-box"><div class="verdict-stars">${stars}</div><div class="verdict-title">${verdict.label}</div>
  <div style="color:#6b7280;font-size:13px;margin-top:6px;">${verdict.description}</div>
  <div class="score-grid">
    <div class="score-item" style="background:#d1fae5;color:#065f46;"><div style="font-size:28px;font-weight:bold;">${verdict.bullishCount}</div><div style="font-size:11px;margin-top:4px;">看涨 BULL</div></div>
    <div class="score-item" style="background:#fee2e2;color:#991b1b;"><div style="font-size:28px;font-weight:bold;">${verdict.bearishCount}</div><div style="font-size:11px;margin-top:4px;">看跌 BEAR</div></div>
    <div class="score-item" style="background:#f3f4f6;color:#6b7280;"><div style="font-size:28px;font-weight:bold;">${verdict.neutralCount}</div><div style="font-size:11px;margin-top:4px;">中性 NEU</div></div>
  </div>
  <div style="margin-top:12px;font-size:13px;color:#6b7280;">净值：<strong style="color:${vc}">${verdict.netScore>0?"+":""}${verdict.netScore}</strong> &nbsp;|&nbsp; 可信度：<strong style="color:${vc}">${verdict.confidence}%</strong></div></div>
  <table><thead><tr><th>指标</th><th>方向</th><th>分析备注</th></tr></thead><tbody>${rows}</tbody></table>
  ${notes?`<div><strong>交易备注：</strong><div class="notes">${esc(notes)}</div></div>`:""}
  <div style="margin-top:32px;padding-top:16px;border-top:1px solid #e5e7eb;font-size:11px;color:#9ca3af;">由 SWEA MI6 Signal Analyzer 生成 · Traderpreneur Community · 本工具仅供学习参考，不构成投资建议</div>
  </body></html>`;
}

      <span class="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-600 pointer-events-none"></span>
    </div>
    <select id="filterTf" class="h-8 px-2.5 rounded-lg border border-white/10 bg-slate-800 text-slate-300 text-xs focus:outline-none focus:ring-1 focus:ring-amber-500/40">
      <option value="all">全部时间框架</option>${TIMEFRAMES.map(tf=>`<option value="${tf}" ${tf===history.filterTimeframe?"selected":""}>${tf}</option>`).join("")}
    </select>
    <select id="filterSig" class="h-8 px-2.5 rounded-lg border border-white/10 bg-slate-800 text-slate-300 text-xs focus:outline-none focus:ring-1 focus:ring-amber-500/40">
      ${[["all","全部信号"],["strong_bullish","强烈多头"],["bullish","多头信号"],["strong_bearish","强烈空头"],["bearish","空头信号"],["mixed","信号混合"],["no_signal","无明确信号"]].map(([v,l])=>`<option value="${v}" ${v===history.filterSignal?"selected":""}>${l}</option>`).join("")}
    </select>
    <div id="filterCount" class="flex items-center text-[11px] text-slate-600 font-mono px-1 self-center">${filtered.length} / ${records.length} 条</div>
  </div>`;
}

function bindFilterBar(){
  const sp = $("#searchPair"); if (sp) sp.oninput = e => { history.searchPair = e.target.value; renderHistContent(loadRecords()); updateFilterCount(); };
  const tf = $("#filterTf"); if (tf) tf.onchange = e => { history.filterTimeframe = e.target.value; renderHistContent(loadRecords()); updateFilterCount(); };
  const sg = $("#filterSig"); if (sg) sg.onchange = e => { history.filterSignal = e.target.value; renderHistContent(loadRecords()); updateFilterCount(); };
}
function updateFilterCount(){
  const records = loadRecords(); const filtered = filterRecords(records);
  const el = $("#filterCount"); if (el) el.textContent = `${filtered.length} / ${records.length} 条`;
}

function filterRecords(records){
  return records.filter(r => {
    const pm = !history.searchPair || r.pair.toLowerCase().includes(history.searchPair.toLowerCase());
    const sm = history.filterSignal==="all" || r.verdict.signal===history.filterSignal;
    const tm = history.filterTimeframe==="all" || r.timeframe===history.filterTimeframe;
    return pm && sm && tm;
  });
}

function renderHistContent(records){
  const el = $("#histContent");
  if (history.tab === "stats"){ el.innerHTML = statsDashboardHTML(records); return; }
  const filtered = filterRecords(records);
  if (filtered.length === 0){
    el.innerHTML = `<div class="flex flex-col items-center justify-center py-24 text-slate-700">
      ${svgIcon('<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>',40)}
      <p class="text-sm mt-4">暂无记录</p>
      <p class="text-xs mt-1 text-slate-800">${records.length===0?"在「信号分析」页面完成分析后点击「保存记录」":"没有符合筛选条件的记录"}</p>
    </div>`;
    return;
  }
  el.innerHTML = `<div class="space-y-2">${filtered.map(recordRowHTML).join("")}</div>`;
  bindRecordRows();
}

function recordRowHTML(r){
  const colorClass = getVerdictColor(r.verdict.signal);
  const d = new Date(r.date);
  const isBull = r.verdict.signal.includes("bullish"), isBear = r.verdict.signal.includes("bearish"), isMixed = r.verdict.signal==="mixed";
  const borderBg = isBull?"border-emerald-500/20 bg-emerald-500/5":isBear?"border-red-500/20 bg-red-500/5":isMixed?"border-amber-500/20 bg-amber-500/5":"border-white/8 bg-slate-800/30";
  const dots = Array.from({length:6}).map((_,i)=>{let c="bg-slate-700";if(i<r.verdict.bullishCount)c="bg-emerald-500";else if(i<r.verdict.bullishCount+r.verdict.bearishCount)c="bg-red-500";return `<div class="w-2 h-2 rounded-full ${c}"></div>`;}).join("");
  return `<div class="record-row rounded-xl border ${borderBg}" data-id="${r.id}">
    <div class="px-4 py-3 flex items-center gap-4 cursor-pointer row-head">
      <div class="flex-shrink-0 min-w-[72px]"><div class="text-sm font-bold text-slate-100 font-mono">${esc(r.pair)}</div><div class="text-[10px] text-slate-600 font-mono">${r.timeframe}</div></div>
      <div class="flex-shrink-0"><div class="text-sm font-bold ${colorClass}">${SIGNAL_LABELS_SHORT[r.verdict.signal]}</div><div class="text-[10px] text-slate-600 font-mono">${r.verdict.confidence}% 可信度</div></div>
      <div class="hidden sm:flex items-center gap-1">${dots}<span class="text-[10px] text-slate-600 ml-1 font-mono">↑${r.verdict.bullishCount} ↓${r.verdict.bearishCount}</span></div>
      ${r.chartImage?`<button class="row-thumb flex-shrink-0 w-12 h-8 rounded overflow-hidden border border-white/10 hover:border-amber-500/30"><img src="${r.chartImage}" class="w-full h-full object-cover"/></button>`:""}
      <div class="flex-1"></div>
      <div class="hidden md:flex items-center gap-1.5 text-[11px] text-slate-600 flex-shrink-0">${svgIcon('<rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',10)}${d.toLocaleDateString("zh-CN")} ${d.toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"})}</div>
      <button class="row-del p-1.5 rounded hover:bg-red-500/15 text-slate-700 hover:text-red-400 flex-shrink-0">${svgIcon('<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>',13)}</button>
    </div>
    <div class="row-detail hidden px-4 pb-4 border-t border-white/5 pt-3 space-y-3">
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
        ${Object.entries(r.indicators).map(([k,val])=>{
          const ar = val.state==="bullish"?STATE_ICON.bullish:val.state==="bearish"?STATE_ICON.bearish:STATE_ICON.neutral;
          const col = val.state==="bullish"?"text-emerald-400":val.state==="bearish"?"text-red-400":"text-slate-500";
          return `<div class="rounded-lg border border-white/8 bg-slate-900/40 p-3"><div class="flex items-center justify-between mb-1.5"><span class="text-[11px] font-semibold text-slate-400">${INDICATOR_DEFINITIONS[k].name}</span><span class="${col}">${svgIcon(ar,12)}</span></div>${val.notes?`<p class="text-[11px] text-slate-500 leading-relaxed">${esc(val.notes)}</p>`:`<p class="text-[11px] text-slate-700 italic">无备注</p>`}</div>`;
        }).join("")}
      </div>
      ${r.notes?`<div class="rounded-lg border border-white/8 bg-slate-900/40 p-3"><span class="text-[10px] font-bold text-slate-600 uppercase tracking-wider">交易备注</span><p class="text-xs text-slate-400 mt-1 leading-relaxed">${esc(r.notes)}</p></div>`:""}
    </div>
  </div>`;
}

function bindRecordRows(){
  document.querySelectorAll(".record-row").forEach(row => {
    const id = row.dataset.id;
    row.querySelector(".row-head").onclick = (e) => {
      if (e.target.closest(".row-del") || e.target.closest(".row-thumb")) return;
      row.querySelector(".row-detail").classList.toggle("hidden");
    };
    const del = row.querySelector(".row-del");
    del.onclick = (e) => { e.stopPropagation(); if (!confirm("确认删除这条记录？")) return; deleteRecord(id); renderHistory(); toast("记录已删除","success"); };
    const thumb = row.querySelector(".row-thumb");
    if (thumb) thumb.onclick = (e) => { e.stopPropagation(); const rec = loadRecords().find(r=>r.id===id); openLightbox(rec.chartImage); };
  });
}

/* ═══════════════════════════════════════════════════════════════════════
   Stats Dashboard (simplified, CSS bars — no external chart lib)
   ═══════════════════════════════════════════════════════════════════════ */

const SIGNAL_COLORS = { strong_bullish:"#059669", bullish:"#10b981", strong_bearish:"#dc2626", bearish:"#ef4444", mixed:"#f59e0b", no_signal:"#475569" };

function statsDashboardHTML(records){
  if (records.length === 0){
    return `<div class="rounded-2xl border border-white/8 bg-slate-800/20 p-10 text-center">
      ${svgIcon('<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>',36)}
      <p class="text-sm text-slate-600 mt-3">暂无数据，保存分析记录后即可查看统计图表</p></div>`;
  }
  const total = records.length;
  const bull = records.filter(r=>r.verdict.signal.includes("bullish")).length;
  const bear = records.filter(r=>r.verdict.signal.includes("bearish")).length;
  const avgConf = Math.round(records.reduce((s,r)=>s+r.verdict.confidence,0)/total);
  const bullRate = Math.round((bull/total)*100);

  // per-pair stats
  const map = new Map();
  records.forEach(r => { if(!map.has(r.pair)) map.set(r.pair,[]); map.get(r.pair).push(r); });
  const pairStats = Array.from(map.entries()).map(([pair,recs])=>({
    pair, total:recs.length,
    avgConfidence: Math.round(recs.reduce((s,r)=>s+r.verdict.confidence,0)/recs.length),
  })).sort((a,b)=>b.total-a.total).slice(0,10);
  const topPair = pairStats[0]?.pair ?? "—";

  // signal distribution
  const counts = {};
  Object.keys(SIGNAL_COLORS).forEach(k=>counts[k]=0);
  records.forEach(r=>counts[r.verdict.signal]++);
  const dist = Object.entries(counts).filter(([,v])=>v>0).map(([k,v])=>({k,v,color:SIGNAL_COLORS[k],pct:Math.round(v/total*100)}));

  const statCard = (icon,label,value,sub,color) => `<div class="rounded-xl border border-white/8 bg-slate-800/40 p-4 flex items-start gap-3">
    <div class="w-9 h-9 rounded-lg flex items-center justify-center flex-shrink-0" style="background:${color}18;border:1px solid ${color}30;color:${color}">${svgIcon(icon,16)}</div>
    <div class="min-w-0"><div class="text-[11px] text-slate-500 font-medium">${label}</div><div class="text-xl font-bold font-mono mt-0.5 leading-none" style="color:${color}">${value}</div>${sub?`<div class="text-[10px] text-slate-600 mt-1">${sub}</div>`:""}</div>
  </div>`;

  return `<div class="space-y-5">
    <div class="flex items-center justify-between">
      <div class="text-xs text-slate-600">共 <span class="font-mono font-bold text-slate-400">${total}</span> 条记录</div>
      <button id="csvBtn" class="flex items-center gap-2 px-4 py-2 rounded-lg text-xs font-semibold active:scale-95" style="background:rgba(240,180,41,0.12);border:1px solid rgba(240,180,41,0.30);color:#f0b429">${svgIcon('<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',13)}导出 CSV (${total} 条)</button>
    </div>
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
      ${statCard('<path d="M22 12h-4l-3 9L9 3l-3 9H2"/>',"总分析次数",total,`${map.size} 个交易对`,"#38bdf8")}
      ${statCard(STATE_ICON.bullish,"多头信号率",bullRate+"%",`${bull} 次多头 / ${bear} 次空头`,"#10b981")}
      ${statCard('<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',"平均可信度",avgConf+"%","所有记录平均值","#f0b429")}
      ${statCard('<polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',"最活跃交易对",topPair,`${pairStats[0]?.total ?? 0} 条记录`,"#a78bfa")}
    </div>

    <div class="rounded-2xl border border-white/8 bg-slate-800/30 p-5">
      <h3 class="text-sm font-bold text-slate-200 font-sora mb-1">信号类型占比</h3>
      <p class="text-[11px] text-slate-600 mb-4">全部记录的信号分布</p>
      <div class="space-y-2.5">
        ${dist.map(d=>`<div class="flex items-center gap-3">
          <div class="w-20 text-right text-[11px] text-slate-400 flex-shrink-0">${SIGNAL_LABELS_SHORT[d.k]}</div>
          <div class="flex-1 h-5 rounded-full bg-slate-700/40 overflow-hidden"><div class="h-full rounded-full" style="width:${d.pct}%;background:${d.color}"></div></div>
          <div class="w-16 text-[11px] font-mono font-bold flex-shrink-0" style="color:${d.color}">${d.v} (${d.pct}%)</div>
        </div>`).join("")}
      </div>
    </div>

    ${pairStats.length>1?`<div class="rounded-2xl border border-white/8 bg-slate-800/30 p-5">
      <h3 class="text-sm font-bold text-slate-200 font-sora mb-1">各交易对平均可信度</h3>
      <p class="text-[11px] text-slate-600 mb-4">信号强度越高，代表该交易对的分析结果越一致</p>
      <div class="space-y-2.5">
        ${pairStats.map(ps=>{
          const color = ps.avgConfidence>=67?"#10b981":ps.avgConfidence>=50?"#f0b429":"#475569";
          return `<div class="flex items-center gap-3">
            <div class="w-16 text-right text-xs font-bold text-slate-400 flex-shrink-0 font-mono">${ps.pair}</div>
            <div class="flex-1 h-5 rounded-full bg-slate-700/40 overflow-hidden"><div class="h-full rounded-full" style="width:${ps.avgConfidence}%;background:linear-gradient(90deg,${color}80,${color})"></div></div>
            <div class="w-10 text-xs font-bold font-mono flex-shrink-0" style="color:${color}">${ps.avgConfidence}%</div>
            <div class="w-8 text-[10px] text-slate-600 flex-shrink-0 text-right">×${ps.total}</div>
          </div>`;
        }).join("")}
      </div>
    </div>`:""}
  </div>`;
}

/* CSV export */
function exportToCSV(records){
  if (records.length === 0){ toast("暂无记录可导出","error"); return; }
  const STATE = { bullish:"看涨", bearish:"看跌", neutral:"中性" };
  const headers = ["记录ID","交易对","时间框架","分析日期","分析时间","蜡烛形态_方向","蜡烛形态_备注","图表形态_方向","图表形态_备注","趋势形态_方向","趋势形态_备注","斐波那契_方向","斐波那契_备注","布林带_方向","布林带_备注","均线MA20_方向","均线MA20_备注","看涨计数","看跌计数","中性计数","净值分","可信度(%)","信号等级","信号描述","备注"];
  const q = v => `"${String(v ?? "").replace(/"/g,'""')}"`;
  const rows = records.map(r=>{
    const d = new Date(r.date); const i = r.indicators;
    return [q(r.id),q(r.pair),q(r.timeframe),q(d.toLocaleDateString("zh-CN")),q(d.toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"})),
      q(STATE[i.candlestick.state]),q(i.candlestick.notes),q(STATE[i.chartPattern.state]),q(i.chartPattern.notes),q(STATE[i.trendPattern.state]),q(i.trendPattern.notes),
      q(STATE[i.fibonacci.state]),q(i.fibonacci.notes),q(STATE[i.bollingerBand.state]),q(i.bollingerBand.notes),q(STATE[i.movingAverage.state]),q(i.movingAverage.notes),
      r.verdict.bullishCount,r.verdict.bearishCount,r.verdict.neutralCount,r.verdict.netScore,r.verdict.confidence,q(SIGNAL_LABELS_SHORT[r.verdict.signal]),q(r.verdict.description),q(r.notes ?? "")].join(",");
  });
  const csv = "﻿" + [headers.join(","), ...rows].join("\n");
  const blob = new Blob([csv], { type:"text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const fn = `SWEA_MI6_Records_${new Date().toISOString().slice(0,10)}.csv`;
  a.href = url; a.download = fn; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  toast(`已导出 ${records.length} 条记录`,"success");
}

// delegate CSV button (re-bound on each stats render via event delegation)
document.addEventListener("click", e => {
  if (e.target.closest && e.target.closest("#csvBtn")) exportToCSV(loadRecords());
});

    keyPatterns:[{name:"38.2% 回撤",signal:"both",desc:"浅回撤，趋势强时常见的支撑/阻力位"},{name:"50% 回撤",signal:"both",desc:"中等回撤，心理重要位置"},{name:"61.8% 回撤（黄金比例）",signal:"both",desc:"最重要的回撤位，强势趋势的最大回撤"},{name:"127.2% 扩展",signal:"both",desc:"第一个常见目标位"},{name:"161.8% 扩展",signal:"both",desc:"强势趋势的主要目标位"}] },
  bollingerBand:{ overview:"布林带（Bollinger Band）由中轨（20日SMA）和上下轨（±2标准差）组成，用于衡量价格的相对高低位和市场波动率。",
    howToUse:["价格触及上轨：相对偏高，可能回调（但强趋势中可持续）","价格触及下轨：相对偏低，可能反弹（但强下跌中可持续）","布林带收窄：波动率降低，即将出现大幅突破","布林带扩张：波动率增加，趋势可能加速"],
    keyPatterns:[{name:"触及下轨反弹",signal:"bullish",desc:"价格触及下轨后出现看涨K线，超卖反弹信号"},{name:"触及上轨回落",signal:"bearish",desc:"价格触及上轨后出现看跌K线，超买回落信号"},{name:"收窄后向上突破",signal:"bullish",desc:"低波动整理后向上突破，趋势启动信号"},{name:"收窄后向下突破",signal:"bearish",desc:"低波动整理后向下突破，下跌趋势启动"},{name:"沿上轨上行",signal:"bullish",desc:"强势上升趋势，价格持续贴近上轨"}] },
  movingAverage:{ overview:"20日均线（MA20）是最常用的短中期趋势参考线，反映过去20根K线的平均成本，是动态支撑/阻力位。",
    howToUse:["价格在MA20上方：短期趋势偏多","价格在MA20下方：短期趋势偏空","MA20向上倾斜 + 价格在其上方 = 强势多头","价格回调至MA20反弹：趋势延续的买入机会"],
    keyPatterns:[{name:"价格在MA20上方",signal:"bullish",desc:"多头控盘，短期趋势向上"},{name:"回调至MA20反弹",signal:"bullish",desc:"上升趋势中的买入机会，MA20提供支撑"},{name:"价格在MA20下方",signal:"bearish",desc:"空头控盘，短期趋势向下"},{name:"反弹至MA20受阻",signal:"bearish",desc:"下降趋势中的卖出机会，MA20提供阻力"},{name:"金叉 / 死叉",signal:"both",desc:"短期MA与MA20的交叉，趋势转换信号"}] },
};

let refExpanded = "candlestick";

function renderReference(){
  $("#page").innerHTML = `
  <div class="min-h-screen fade-in">
    <div class="border-b border-white/8 bg-slate-900/50 sticky top-0 z-20">
      <div class="max-w-5xl mx-auto px-4 sm:px-6 py-3 flex items-center gap-3">
        <span class="text-amber-500">${svgIcon('<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',18)}</span>
        <div><h1 class="text-lg font-bold font-sora">指标说明 · Reference</h1><p class="text-xs text-slate-500">SWEA MI6 六大指标判断标准与检查清单</p></div>
      </div>
    </div>
    <div class="max-w-5xl mx-auto px-4 sm:px-6 py-6 space-y-4">
      <div class="rounded-xl border border-amber-500/20 bg-amber-500/5 p-5">
        <h2 class="text-base font-bold text-amber-400 mb-2 font-sora">SWEA MI6 系统概览</h2>
        <p class="text-sm text-slate-300/80 leading-relaxed mb-4">MI6 是 SWEA 交易系统的核心信号框架，通过 6 个维度的综合分析来判断当前市场是否具备高概率的交易机会。当多数指标方向一致时，信号可靠性显著提升。</p>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
          ${[["5-6 项看涨","强烈多头信号","text-emerald-400 bg-emerald-500/10 border-emerald-500/20"],["4 项看涨","多头信号","text-emerald-500 bg-emerald-500/[0.08] border-emerald-500/15"],["5-6 项看跌","强烈空头信号","text-red-400 bg-red-500/10 border-red-500/20"],["4 项看跌","空头信号","text-red-500 bg-red-500/[0.08] border-red-500/15"],["多空相近","信号混乱，观望","text-yellow-400 bg-yellow-500/10 border-yellow-500/20"],["多项中性","无明确信号","text-slate-400 bg-slate-700/30 border-slate-600/20"]].map(([l,r,c])=>`<div class="rounded-lg border p-3 ${c}"><div class="text-xs font-semibold">${l}</div><div class="text-xs opacity-80 mt-0.5">${r}</div></div>`).join("")}
        </div>
      </div>
      <div id="refList" class="space-y-4"></div>
      <div class="text-center py-6 text-xs text-slate-600/50">SWEA MI6 Signal Analyzer · Traderpreneur Community<br/>本工具仅供学习参考，不构成投资建议</div>
    </div>
  </div>`;
  renderRefList();
}

function renderRefList(){
  $("#refList").innerHTML = INDICATOR_ORDER.map(id=>{
    const ind = INDICATOR_DEFINITIONS[id]; const detail = INDICATOR_DETAILS[id];
    const expanded = refExpanded === id;
    const catColor = ind.category==="PA"?"text-blue-400 bg-blue-500/10 border-blue-500/20":"text-purple-400 bg-purple-500/10 border-purple-500/20";
    return `<div class="rounded-xl border border-white/8 bg-slate-800/40 overflow-hidden">
      <button class="ref-acc w-full flex items-center gap-3 p-4 text-left hover:bg-slate-800/60 transition-colors" data-id="${id}">
        <span class="text-xs font-bold px-2 py-0.5 rounded border font-mono flex-shrink-0 ${catColor}">${ind.category}</span>
        <div class="flex-1 min-w-0"><div class="flex items-center gap-2"><h3 class="text-sm font-bold text-slate-100 font-sora">${ind.name}</h3><span class="text-xs text-slate-500 hidden sm:inline">${ind.nameEn}</span></div><p class="text-xs text-slate-500 mt-0.5 truncate">${ind.description}</p></div>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-slate-500 flex-shrink-0" style="${expanded?'transform:rotate(180deg)':''}"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      ${expanded?`<div class="px-4 pb-5 space-y-5 border-t border-white/8">
        <div class="pt-4"><p class="text-sm text-slate-300/80 leading-relaxed">${detail.overview}</p></div>
        <div><h4 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">使用方法</h4><div class="space-y-1.5">${detail.howToUse.map((t,i)=>`<div class="flex gap-2 text-sm text-slate-300/70"><span class="text-amber-500 flex-shrink-0 font-mono text-xs mt-0.5">${String(i+1).padStart(2,"0")}</span><span>${t}</span></div>`).join("")}</div></div>
        <div><h4 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">关键形态 / 信号</h4><div class="space-y-2">${detail.keyPatterns.map(p=>{
          const ic = p.signal==="bullish"?`<span class="text-emerald-400">${svgIcon(STATE_ICON.bullish,14)}</span>`:p.signal==="bearish"?`<span class="text-red-400">${svgIcon(STATE_ICON.bearish,14)}</span>`:p.signal==="both"?`<div class="flex flex-col gap-0.5"><span class="text-emerald-400">${svgIcon(STATE_ICON.bullish,10)}</span><span class="text-red-400">${svgIcon(STATE_ICON.bearish,10)}</span></div>`:`<span class="text-slate-400">${svgIcon(STATE_ICON.neutral,14)}</span>`;
          return `<div class="flex items-start gap-3 p-3 rounded-lg bg-slate-900/40 border border-white/8"><div class="flex-shrink-0 mt-0.5">${ic}</div><div class="min-w-0"><div class="text-sm font-semibold text-slate-100">${p.name}</div><div class="text-xs text-slate-500 mt-0.5">${p.desc}</div></div></div>`;
        }).join("")}</div></div>
        <div><h4 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">快速检查清单</h4><div class="space-y-1">${ind.reference.map(r=>`<div class="flex gap-2 text-xs text-slate-500"><span class="text-amber-500 flex-shrink-0">›</span><span>${r}</span></div>`).join("")}</div></div>
      </div>`:""}
    </div>`;
  }).join("");
  document.querySelectorAll(".ref-acc").forEach(b => b.onclick = () => { refExpanded = refExpanded===b.dataset.id ? null : b.dataset.id; renderRefList(); });
}
